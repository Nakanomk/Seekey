[general]
# How long a bubble remains visible before it starts disappearing.
duration-ms=1200

# Pause length after which the next typed character starts a new text bubble.
typing-idle-ms=650

# Fade duration when style.disappear=fade. Use 0 to remove immediately after
# duration-ms even if disappear=fade.
fade-ms=180

margin=96
# Horizontal offset from the anchored left or right edge. Only meaningful
# for style.align=left or style.align=right; ignored for center.
margin-horizontal=0
max-items=5
window-width=720
window-height=160

# auto uses layer-shell when available and falls back to a normal window.
# required exits if layer-shell is unavailable, which is the stable choice for
# niri/Hyprland/wlroots if you need the overlay to stay across workspaces.
# off always uses the fallback window.
layer-shell=auto

# Color preset.  Individual [style] color keys override the preset, so you can
# pick a theme and still tweak a single color.  Built-in presets:
#   default   – dark and neutral
#   nord      – Nord palette (blues, muted)
#   dracula   – Dracula palette (purples, dark)
#   catppuccin – Catppuccin Mocha (lavender, dark)
#   monokai   – Monokai palette (green accent, dark)
#   light     – light neutral
theme=default

# Behavior: whether identical key combos stack as "Ctrl+C x3".
# yes (default) or no.
merge-repeats=yes

# Behavior: whether a modifier-only bubble updates when a non-modifier key is
# added (e.g. "Ctrl" becomes "Ctrl + C").  yes (default) or no.
merge-modifiers=yes

[style]
# left, center, or right. The default right alignment makes bubbles grow from a
# fixed right boundary toward the left.
align=right

# instant or fade.
disappear=fade

spacing=7
overlay-padding=12
key-padding-x=14
key-padding-y=8
key-radius=6
key-border-width=1
key-font-px=20
key-font-weight=700
typing-max-width=480

# GTK CSS color values are accepted here.  Override theme preset colors below.
foreground=#f7f7f2
background=alpha(#111318, 0.86)
border-color=alpha(#ffffff, 0.18)
shadow=0 7px 22px alpha(#000000, 0.30)

placeholder-text=Seekey
placeholder-foreground=alpha(#f7f7f2, 0.74)
placeholder-background=alpha(#111318, 0.56)
placeholder-border-color=alpha(#ffffff, 0.14)

# Optional: override key icons with Unicode glyphs.  Key names match the
# labels shown in bubbles (Backspace, Enter, Space, Tab, Esc, etc.).
# Remove this section or comment out every key to use the built-in defaults.
[icons]
Backspace="⌫"
Enter="↵"
Space="␣"
Tab="↹"
Esc="⎋"
Delete="⌦"
Up="↑"
Down="↓"
Left="←"
Right="→"
