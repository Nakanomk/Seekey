[general]
# How long a bubble remains visible before it starts disappearing.
duration-ms=1200

# Pause length after which the next typed character starts a new text bubble.
typing-idle-ms=650

# Fade duration when style.disappear=fade. Use 0 to remove immediately after
# duration-ms even if disappear=fade.
fade-ms=180

margin=96
max-items=5
window-width=720
window-height=160

[style]
# left, center, or right. The default right alignment makes bubbles grow from a
# fixed right boundary toward the left.
align=right

# instant or fade.
disappear=fade

spacing=7
overlay-padding=12
key-min-width=58
key-padding-x=14
key-padding-y=8
key-radius=6
key-border-width=1
key-font-px=20
key-font-weight=700
typing-max-width=480

# GTK CSS color values are accepted here.
foreground=#f7f7f2
background=alpha(#111318, 0.86)
border-color=alpha(#ffffff, 0.18)
shadow=0 7px 22px alpha(#000000, 0.30)

placeholder-text=Seekey
placeholder-foreground=alpha(#f7f7f2, 0.74)
placeholder-background=alpha(#111318, 0.56)
placeholder-border-color=alpha(#ffffff, 0.14)
